<!DOCTYPE html>
<html>
<head>
    <title>Add Income – YABA</title>
    <!-- ADDED: proper DOCTYPE + head section with stylesheet in correct position — Task 5 -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="form-wrapper">
    <div class="form-card">

        <h2>Add Income</h2>

        <form method="POST" action="/add-income">

            <div class="input-group">
                <input type="text" name="source" placeholder="Income Source" required>
            </div>

            <div class="input-group">
                <input type="date" name="date" required>
            </div>

            <div class="input-group">
                <input type="number" name="amount" placeholder="Amount ($)" required>
            </div>

            <button type="submit" class="btn-submit">Add Income</button>

        </form>

        <!-- ADDED: Back to Dashboard link — Task 5 -->
        <p style="margin-top:25px; color:#ccc;">
            ← <a href="/dashboard" style="color:#4ade80;">Back to Dashboard</a>
        </p>

    </div>
</div>

</body>
</html>
