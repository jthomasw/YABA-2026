<!DOCTYPE html>
<html>
<head>
    <title>Add Expense</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="add-expense-wrapper">
    <div class="add-expense-card">

        <h2 id="title">Add Expense</h2>

        <!-- Step 1: Choice Buttons -->
        <div id="questionStep" class="choice-section">
            <button class="choice-btn manual-btn" onclick="showForm()">Manual Entry</button>
            <button class="choice-btn upload-btn" onclick="showForm()">Upload Receipt</button>
        </div>

        <!-- Step 2: Actual Form -->
        <form id="expenseForm" method="POST" action="/add-expense" style="display: none;">

            <div class="input-group">
                <label>Category</label>
                <input type="text" name="category" placeholder="e.g. Food, Rent, Transport" required>
            </div>

            <div class="input-group">
                <label>Date</label>
                <input type="date" name="date" required>
            </div>

            <div class="input-group">
                <label>Place / Merchant</label>
                <input type="text" name="place" placeholder="Where did you spend?">
            </div>

            <div class="input-group">
                <label>Note (Optional)</label>
                <input type="text" name="note" placeholder="Any extra note">
            </div>

            <div class="input-group">
                <label>Amount ($)</label>
                <input type="number" step="0.01" name="amount" placeholder="0.00" required>
            </div>

            <button type="submit" class="btn-submit">Save Expense</button>
        </form>

        <!-- Back Link -->
        <div class="back-link">
            <a href="/dashboard">← Back to Dashboard</a>
        </div>

    </div>
</div>

<script>
function showForm() {
    document.getElementById("questionStep").style.display = "none";
    document.getElementById("expenseForm").style.display = "block";
    document.getElementById("title").innerText = "Enter Expense Details";
}
</script>

</body>
</html>
