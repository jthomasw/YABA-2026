<!DOCTYPE html>
<html>
<head>
    <title>Transactions</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="main-container">
    <div class="content-card">

        <h2>Transaction History</h2>

        <!-- Filter Buttons -->
        <div class="filter-tabs">
        <a href="/transactions" class="{{if not .Type}}active{{end}}">All</a>
        <a href="/transactions?type=income" class="{{if eq .Type "income"}}active{{end}}">Income</a>
        <a href="/transactions?type=expense" class="{{if eq .Type "expense"}}active{{end}}">Expense</a>
        </div>

        <!-- Table -->
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th class="type-col">Type</th>
                        <th class="name-col">Name</th>
                        <th class="date-col">Date</th>
                        <th class="amount-col">Amount</th>
                        <th class="action-col">Action</th>
                    </tr>
                </thead>
                <tbody>
                {{range .Transactions}}
                <tr>
                    <td>{{.Type}}</td>
                    <td>{{.Name}}</td>
                    <td>{{.Date}}</td>
                    
                    {{if eq .Type "Income"}}
                        <td class="income-amount">+${{.Amount}}</td>
                    {{else}}
                        <td class="expense-amount">-{{.Amount}}</td>
                    {{end}}
                    
                    <td>
                        {{if eq .Type "Income"}}
                            <a href="/delete-transaction?id={{.ID}}&type=income" 
                               class="delete-btn"
                               onclick="return confirm('Delete this transaction?')">×</a>
                        {{else}}
                            <a href="/delete-transaction?id={{.ID}}&type=expense" 
                               class="delete-btn"
                               onclick="return confirm('Delete this transaction?')">×</a>
                        {{end}}
                    </td>
                </tr>
                {{end}}
                </tbody>
            </table>
        </div>

        <div class="back-link">
            <a href="/dashboard">← Back to Dashboard</a>
        </div>

    </div>
</div>

</body>
</html>
